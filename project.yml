packages:
  - name: scraie
    environment:
      FLIGHTS_SERPAPI_KEY: ${FLIGHTS_SERPAPI_KEY}
      FLIGHTS_DB_URI: ${FLIGHTS_DB_URI}
      SCRAIE_DISCORD_WEBHOOK: ${SCRAIE_DISCORD_WEBHOOK}
    functions:
      - name: flights
        runtime: "go:1.25"
        limits:
          timeout: 10000
          memory: 512
        triggers:
          - name: daily
            sourceType: scheduler
            sourceDetails:
              cron: "0 0 * * *"
